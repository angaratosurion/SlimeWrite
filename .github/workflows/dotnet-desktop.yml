name: .NET 10 MAUI Build (Windows & Android)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    env:
     Solution_Name: SlimeWrite\SlimeWrite.sln
      Configuration: Release

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 1. Εγκατάσταση του .NET 10 SDK
    - name: Install .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    # 2. Εγκατάσταση των MAUI Workloads
    - name: Install .NET MAUI Workloads
      run: dotnet workload install maui-android maui-windows

    # 3. Restore των πακέτων
    - name: Restore Dependencies
      run: dotnet restore $env:Solution_Name

    # 4. Build για Windows
    - name: Build & Publish Windows App
      run: |
        dotnet publish $env:Solution_Name -c $env:Configuration -f net10.0-windows10.0.19041.0 --output ./publish-windows /p:WindowsPackageType=None /p:CreatePackageOnPublish=false

    # 5. Build για Android (Χωρίς εξωτερική Java)
    - name: Build & Publish Android App
      run: |
        dotnet publish $env:Solution_Name -c $env:Configuration -f net10.0-android --output ./publish-android /p:AndroidKeyStore=false

    # 6. Ανέβασμα Windows
    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SlimeWrite-Windows
        path: ./publish-windows

    # 7. Ανέβασμα Android APK
    - name: Upload Android Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SlimeWrite-Android
        path: ./publish-android/*.apk
